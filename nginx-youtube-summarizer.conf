# YouTube 영상 요약기 nginx reverse proxy 설정
# 스트레스 몬스터 nginx 설정 재활용. 포트 7860→8501, Streamlit용 경로만 보강.
#
#   sudo cp ~/youtube-summarizer/nginx-youtube-summarizer.conf /etc/nginx/sites-available/youtube-summarizer
#   sudo vi /etc/nginx/sites-available/youtube-summarizer   # __STUDENT_ID__ 채우기
#   sudo ln -s /etc/nginx/sites-available/youtube-summarizer /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# WebSocket Upgrade 매핑 (Streamlit 실시간 통신 필수)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name s21-demo.aiweb2026.site;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8501;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket 헤더 (Streamlit 필수, 빠뜨리면 "Please wait..." 무한 로딩)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_redirect  off;

        # Gemini 무료 티어 응답 + 장편 자막 요약 대비
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
