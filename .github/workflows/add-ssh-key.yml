# 1회용: 작동 중인 Actions SSH 접속으로 내 oracle_key 공개키를 서버 authorized_keys에 등록.
# 이후 로컬에서 `ssh -i ~/.ssh/oracle_key ubuntu@<서버>` 로 직접 접속 가능.
# 실행: GitHub repo → Actions 탭 → "Add my SSH key to server" → Run workflow.
# (성공/실패 자체가 "Actions가 이 서버에 닿는지" 테스트도 겸함)

name: Add my SSH key to server

on:
  workflow_dispatch:

jobs:
  add-key:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 서버 authorized_keys에 공개키 등록 (멱등)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 2m
          script: |
            set -e
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            touch ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys
            PUBKEY='ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKoyUnaTML9YRJhlsgvSHK80xIMO/1gQ4pv+vc3PKrpV shbaek@DESKTOP-J3U67IS'
            if grep -qF "$PUBKEY" ~/.ssh/authorized_keys; then
              echo "✅ 이미 등록되어 있음"
            else
              echo "$PUBKEY" >> ~/.ssh/authorized_keys
              echo "✅ 공개키 등록 완료"
            fi
            echo "현재 등록된 키 개수: $(grep -c . ~/.ssh/authorized_keys)"
            echo "접속 사용자: $(whoami)@$(hostname)"
