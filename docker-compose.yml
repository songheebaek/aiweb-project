# YouTube 영상 요약기 → Oracle E2.1.Micro 운영용 compose
# 스트레스 몬스터 compose 패턴 재활용. 포트 7860→8501, 헬스체크 엔드포인트 교체.
#
#   docker compose up -d --build              # 첫 빌드 + 백그라운드 기동
#   docker compose logs -f                    # 실시간 로그
#   git pull && docker compose up -d --build  # 코드 갱신 후 재배포

services:
  youtube-summarizer:
    build: .
    image: youtube-summarizer:latest
    container_name: youtube-summarizer
    restart: unless-stopped

    ports:
      - "8501:8501"               # 호스트:컨테이너 (nginx가 80에서 → 8501로 프록시)

    env_file:
      - .env                      # GOOGLE_API_KEY 등 (git 제외 / chmod 600)

    # E2.1.Micro 1GB RAM 보호
    mem_limit: 400m
    memswap_limit: 1200m
    deploy:
      resources:
        limits:
          memory: 400M

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health').read()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
